version: "3.3"

services:
  univo:
    container_name: univo
    restart: always
    image: node:20.10.0
    ports:
      - 4001:5007
    volumes:
      - ./:/usr/src/univo
    working_dir: /univo
    
    networks:
      - monorepo-network

    # FOR PRODUCTION 
    command: bash -c "rm -rf dist && npm install && npm run build && npm run start:prod"

  univo-batch:
    container_name: univo-batch
    restart: unless-stopped
    image: node:20.10.0
    ports:
      - 4002:5008
    volumes:
      - ./:/usr/src/univo
    working_dir: /usr/src/univo
    
    networks:
      - monorepo-network

    # FOR PRODUCTION 
    command: bash -c "npm install && npm run build && npm run start:prod:batch"

  
networks:
  monorepo-network:
    driver: bridge